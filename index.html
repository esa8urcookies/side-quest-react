<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚔️</text></svg>" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Side Quest — RPG Quest Board</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              navy: {
                950: '#0f172a',
                900: '#0d1b2e',
                800: '#1e293b',
                700: '#253347',
                600: '#334155',
              },
              gold: {
                300: '#fcd34d',
                400: '#fbbf24',
                500: '#f59e0b',
                600: '#d97706',
              },
              quest: {
                adventure: '#f97316',
                social: '#ec4899',
                creative: '#8b5cf6',
                physical: '#22c55e',
                mental: '#06b6d4',
                random: '#f59e0b',
              }
            },
            animation: {
              'glow-pulse': 'glow-pulse 2s ease-in-out infinite',
              'xp-fill': 'xp-fill 0.6s ease-out',
              'level-up': 'level-up 0.5s ease-out',
              'fade-in': 'fade-in 0.3s ease-out',
              'slide-up': 'slide-up 0.4s ease-out',
            },
            keyframes: {
              'glow-pulse': {
                '0%, 100%': { boxShadow: '0 0 5px currentColor' },
                '50%': { boxShadow: '0 0 20px currentColor, 0 0 40px currentColor' },
              },
              'xp-fill': {
                from: { width: '0%' },
              },
              'level-up': {
                '0%': { transform: 'scale(0.8)', opacity: '0' },
                '60%': { transform: 'scale(1.1)' },
                '100%': { transform: 'scale(1)', opacity: '1' },
              },
              'fade-in': {
                from: { opacity: '0' },
                to: { opacity: '1' },
              },
              'slide-up': {
                from: { transform: 'translateY(30px)', opacity: '0' },
                to: { transform: 'translateY(0)', opacity: '1' },
              },
            },
          }
        }
      }
    </script>
    <style>
      * { box-sizing: border-box; }
      body {
        background-color: #0f172a;
        color: #e2e8f0;
        font-family: 'Segoe UI', system-ui, sans-serif;
        min-height: 100vh;
      }
      ::-webkit-scrollbar { width: 8px; }
      ::-webkit-scrollbar-track { background: #1e293b; }
      ::-webkit-scrollbar-thumb { background: #475569; border-radius: 4px; }
      ::-webkit-scrollbar-thumb:hover { background: #f59e0b; }

      .quest-card-adventure:hover { box-shadow: 0 0 20px rgba(249,115,22,0.4), 0 0 40px rgba(249,115,22,0.15); }
      .quest-card-social:hover    { box-shadow: 0 0 20px rgba(236,72,153,0.4), 0 0 40px rgba(236,72,153,0.15); }
      .quest-card-creative:hover  { box-shadow: 0 0 20px rgba(139,92,246,0.4), 0 0 40px rgba(139,92,246,0.15); }
      .quest-card-physical:hover  { box-shadow: 0 0 20px rgba(34,197,94,0.4),  0 0 40px rgba(34,197,94,0.15); }
      .quest-card-mental:hover    { box-shadow: 0 0 20px rgba(6,182,212,0.4),  0 0 40px rgba(6,182,212,0.15); }
      .quest-card-random:hover    { box-shadow: 0 0 20px rgba(245,158,11,0.4), 0 0 40px rgba(245,158,11,0.15); }

      .xp-bar-fill { transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1); }

      @keyframes shimmer {
        0% { background-position: -200% center; }
        100% { background-position: 200% center; }
      }
      .gold-shimmer {
        background: linear-gradient(90deg, #f59e0b, #fcd34d, #f59e0b, #d97706, #f59e0b);
        background-size: 200% auto;
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        animation: shimmer 3s linear infinite;
      }

      .star-filled { color: #f59e0b; }
      .star-empty  { color: #475569; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
