<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚔️</text></svg>" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Side Quest V2</title>

  <style>
    /* Base dark background */
    body {
      background-color: #0f172a;
      color: #e2e8f0;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      min-height: 100vh;
    }

    /* Custom scrollbar */
    ::-webkit-scrollbar {
      width: 6px;
    }
    ::-webkit-scrollbar-track {
      background: #1e293b;
    }
    ::-webkit-scrollbar-thumb {
      background: #f59e0b;
      border-radius: 3px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: #d97706;
    }

    /* Gold shimmer text */
    .gold-shimmer {
      background: linear-gradient(
        90deg,
        #f59e0b 0%,
        #fcd34d 30%,
        #f59e0b 50%,
        #fcd34d 70%,
        #f59e0b 100%
      );
      background-size: 200% auto;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: shimmer 3s linear infinite;
    }

    /* Quest card hover glow */
    .quest-card {
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }
    .quest-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(245, 158, 11, 0.15);
    }
    .quest-card.completed {
      opacity: 0.55;
      filter: grayscale(40%);
    }

    /* XP bar animation */
    .xp-bar-fill {
      transition: width 0.8s cubic-bezier(0.4, 0, 0.2, 1);
      background: linear-gradient(90deg, #d97706, #f59e0b, #fcd34d);
    }

    /* Stat bar */
    .stat-bar-fill {
      background: linear-gradient(90deg, #7c3aed, #a855f7);
      transition: width 0.6s ease;
    }

    /* Class-themed glow helpers */
    .glow-bard    { box-shadow: 0 0 16px 3px rgba(236, 72, 153, 0.4); }
    .glow-mage    { box-shadow: 0 0 16px 3px rgba(139, 92, 246, 0.4); }
    .glow-ranger  { box-shadow: 0 0 16px 3px rgba(34, 197, 94, 0.4); }
    .glow-warrior { box-shadow: 0 0 16px 3px rgba(239, 68, 68, 0.4); }
    .glow-rogue   { box-shadow: 0 0 16px 3px rgba(59, 130, 246, 0.4); }
    .glow-adventurer { box-shadow: 0 0 16px 3px rgba(245, 158, 11, 0.4); }

    /* Modal backdrop */
    .modal-backdrop {
      backdrop-filter: blur(4px);
      background: rgba(8, 15, 30, 0.85);
    }

    /* Difficulty stars */
    .diff-star { color: #f59e0b; }
    .diff-star.empty { color: #334155; }

    /* Completed check badge */
    .completed-badge {
      background: linear-gradient(135deg, #059669, #34d399);
      color: white;
      border-radius: 50%;
      width: 28px;
      height: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      font-weight: bold;
    }

    /* Nav link active */
    .nav-link-active {
      color: #f59e0b;
      border-bottom: 2px solid #f59e0b;
    }

    /* Onboarding step indicator */
    .step-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #334155;
      transition: background 0.2s;
    }
    .step-dot.active {
      background: #f59e0b;
    }
    .step-dot.done {
      background: #059669;
    }

    /* Interest checkbox */
    .interest-chip {
      cursor: pointer;
      transition: all 0.15s ease;
      user-select: none;
    }
    .interest-chip:hover {
      border-color: #f59e0b;
    }
    .interest-chip.selected {
      background: rgba(245, 158, 11, 0.15);
      border-color: #f59e0b;
      color: #fcd34d;
    }

    /* Personality button */
    .personality-btn {
      cursor: pointer;
      transition: all 0.15s ease;
      user-select: none;
    }
    .personality-btn:hover {
      border-color: #f59e0b;
      background: rgba(245, 158, 11, 0.08);
    }
    .personality-btn.selected {
      border-color: #f59e0b;
      background: rgba(245, 158, 11, 0.15);
      color: #fcd34d;
    }

    /* Leaderboard row highlight */
    .lb-self {
      background: linear-gradient(90deg, rgba(245, 158, 11, 0.12), rgba(245, 158, 11, 0.06));
      border: 1px solid rgba(245, 158, 11, 0.4);
    }

    /* Level up modal animation */
    .levelup-modal {
      animation: levelup 0.5s ease-out forwards;
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
